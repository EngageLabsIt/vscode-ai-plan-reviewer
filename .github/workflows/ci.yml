name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Lint, type-check & test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run compile

      - name: Unit tests
        run: npm run test
