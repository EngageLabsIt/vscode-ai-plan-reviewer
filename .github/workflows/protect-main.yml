name: Protect Main Branch

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  require-pr:
    name: Verify push came through a Pull Request
    runs-on: ubuntu-latest
    steps:
      - name: Check PR association
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=$(gh api \
            "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0].number' 2>/dev/null || true)

          if [ -z "$PR_NUMBER" ]; then
            echo "::error::Direct pushes to main are not allowed."
            echo "::error::Please open a Pull Request to merge your changes."
            exit 1
          fi

          echo "✅ Commit ${{ github.sha }} was merged via PR #${PR_NUMBER}."
