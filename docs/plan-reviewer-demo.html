<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan Reviewer — VS Code Extension Demo</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 13px;
    background: #0f1117;
    color: #c9d1d9;
  }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #161b22; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #484f58; }

  #app { display: flex; flex-direction: column; height: 100vh; }

  /* HEADER */
  .header {
    background: #161b22; border-bottom: 1px solid #21262d;
    padding: 0 16px; display: flex; align-items: center; height: 48px; flex-shrink: 0;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .header-logo {
    width: 28px; height: 28px; border-radius: 6px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    display: flex; align-items: center; justify-content: center; font-size: 14px;
  }
  .header-title { font-weight: 700; font-size: 14px; color: #e6edf3; margin-left: 10px; }
  .header-badge {
    font-size: 11px; color: #7d8590; background: #1c2128;
    padding: 2px 8px; border-radius: 10px; border: 1px solid #30363d; margin-left: 10px;
  }
  .header-right { margin-left: auto; font-size: 11px; color: #7d8590; }

  /* TOOLBAR */
  .toolbar {
    background: #161b22; border-bottom: 1px solid #21262d;
    padding: 8px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .toolbar-title { font-weight: 600; font-size: 13px; color: #e6edf3; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .status-badge {
    font-size: 11px; padding: 2px 10px; border-radius: 10px; font-weight: 600;
  }
  .status-badge.in_review { background: rgba(251,191,36,0.12); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
  .status-badge.approved { background: rgba(52,211,153,0.12); color: #34d399; border: 1px solid rgba(52,211,153,0.3); }
  .version-select {
    background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
    border-radius: 6px; padding: 3px 8px; font-size: 12px; font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .comment-counts { display: none; }
  .toolbar-actions { display: flex; gap: 6px; margin-left: auto; }

  .btn {
    transition: all 0.15s ease; cursor: pointer;
    border: 1px solid #30363d; background: #161b22; color: #c9d1d9;
    padding: 5px 12px; border-radius: 6px; font-size: 12px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .btn:hover { background: #1f2937; border-color: #484f58; }
  .btn.primary { background: #238636; border-color: #2ea043; color: #fff; }
  .btn.primary:hover { background: #2ea043; }
  .btn.active { background: #1f6feb; border-color: #388bfd; color: #fff; }
  .btn:disabled { opacity: 0.5; cursor: default; }

  /* MAIN */
  .main { flex: 1; display: flex; overflow: hidden; }

  /* PLAN VIEWER */
  .plan-viewer { flex: 1; overflow-y: auto; padding: 8px 0; }

  .line-row {
    display: flex; align-items: flex-start; min-height: 24px; cursor: pointer;
    transition: background 0.1s;
  }
  .line-row:hover { background: rgba(136,198,255,0.04); }
  .line-row:hover .add-btn { opacity: 1 !important; }
  .line-row.range-selected { background: rgba(99,102,241,0.08); }
  .line-row--search-match { background: rgba(255, 213, 0, 0.08); }
  .line-row--search-current { background: rgba(255, 213, 0, 0.22); outline: 1px solid rgba(255, 213, 0, 0.5); }

  /* Search bar */
  .search-bar {
    display: flex; align-items: center; gap: 4px;
    background: #1c2128; border-bottom: 1px solid #21262d;
    padding: 4px 12px; flex-shrink: 0;
    font-family: 'Plus Jakarta Sans', sans-serif;
    animation: fadeIn 0.2s ease;
  }
  .search-bar__input {
    background: transparent; border: none; outline: none; color: #c9d1d9;
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px;
    width: 200px; padding: 2px 4px;
  }
  .search-bar__input::placeholder { color: #484f58; }
  .search-bar__count {
    font-size: 11px; color: #8b949e; white-space: nowrap; min-width: 40px; text-align: center;
  }
  .search-bar__btn {
    display: inline-flex; align-items: center; justify-content: center;
    background: none; border: none; cursor: pointer; color: #8b949e;
    padding: 2px; border-radius: 4px; transition: background 0.1s;
  }
  .search-bar__btn:hover { background: rgba(136,198,255,0.1); color: #c9d1d9; }

  .gutter {
    width: 60px; min-width: 60px; display: flex; align-items: center;
    justify-content: flex-end; padding-right: 4px; position: relative; user-select: none;
  }
  .gutter-dot {
    position: absolute; left: 8px; width: 7px; height: 7px; border-radius: 50%;
  }
  .add-btn {
    opacity: 0; background: none; border: none; color: #6366f1;
    cursor: pointer; font-size: 16px; line-height: 1; padding: 0 2px;
    transition: opacity 0.1s;
  }
  .line-num {
    font-size: 12px; color: #484f58; font-variant-numeric: tabular-nums;
    min-width: 24px; text-align: right;
  }
  .line-divider {
    width: 1px; background: #21262d; margin: 0 8px; flex-shrink: 0; align-self: stretch;
  }
  .line-content { flex: 1; padding: 1px 12px 1px 4px; line-height: 22px; }
  .line-content .heading { color: #c4b5fd; font-weight: 700; }
  .line-content .code-line { color: #a5d6ff; }
  .line-content .fence { color: #7d8590; }
  .line-content .inline-code {
    background: rgba(139,92,246,0.15); padding: 1px 5px; border-radius: 3px;
    color: #c4b5fd; font-family: monospace; font-size: 0.85em;
  }
  .section-toggle {
    cursor: pointer; color: #484f58; font-size: 10px; margin-right: 4px;
    display: none !important; transition: transform 0.15s;
  }
  .section-toggle.collapsed { transform: rotate(-90deg); }

  /* COMMENT FORM */
  .comment-form-wrap {
    margin: 4px 60px 8px 68px; border-left: 2px solid #6366f1;
    animation: fadeIn 0.2s ease;
  }
  .comment-form {
    background: #1c2128; border: 1px solid #30363d; border-radius: 8px;
    padding: 12px; font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .comment-form textarea {
    width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    color: #c9d1d9; padding: 8px; font-size: 13px; resize: vertical; min-height: 60px;
    outline: none; font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .comment-form textarea:focus { border-color: #6366f1; }
  .comment-form-actions {
    display: flex; align-items: center; gap: 8px; margin-top: 8px;
  }
  .comment-form select {
    background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
    border-radius: 6px; padding: 4px 8px; font-size: 12px;
  }
  .comment-form .hint { font-size: 10px; color: #484f58; }
  .comment-form .range-label { font-size: 11px; color: #7d8590; margin-bottom: 6px; }

  /* Inline comment form */
  .comment-form-inline {
    margin: 4px 0 4px 0; padding-left: 8px;
    border-left: 2px solid #6366f1; animation: fadeIn 0.2s ease;
  }
  .comment-form-inline__textarea {
    width: 100%; min-height: 28px; background: #0d1117; color: #c9d1d9;
    border: 1px solid #30363d; border-radius: 4px; padding: 4px 6px;
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px;
    resize: none; overflow: hidden; outline: none; box-sizing: border-box;
  }
  .comment-form-inline__textarea:focus { border-color: #6366f1; }
  .comment-form-inline__actions { display: flex; gap: 6px; margin-top: 4px; }
  .comment-form-inline__btn {
    padding: 2px 10px; font-size: 12px; border: none; border-radius: 4px; cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .comment-form-inline__btn--submit {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 2px 6px; min-width: 28px; background: #6366f1; color: #fff;
  }
  .comment-form-inline__btn--cancel { background: #1c2128; color: #8b949e; }

  /* Selection highlighting */
  .line-row--selecting { background: rgba(130, 200, 255, 0.18); }

  /* Floating selection comment button */
  .selection-comment-btn {
    position: fixed; z-index: 1000; display: inline-flex; align-items: center;
    justify-content: center; padding: 4px 8px; min-width: 32px;
    background: #6366f1; color: #fff; border: none; border-radius: 4px;
    cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.4); font-size: 12px;
  }

  /* COMMENT CARD */
  .comment-card-wrap {
    margin: 4px 60px 8px 68px; animation: fadeIn 0.2s ease;
    transition: all 0.2s ease;
  }
  .comment-card-wrap:hover { transform: translateX(2px); }
  .comment-card {
    border-left: none; border-radius: 0 8px 8px 0;
    padding: 10px; font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .comment-card-header {
    display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
  }
  .comment-category { display: none; }
  .comment-ref { font-size: 11px; color: #484f58; }
  .comment-actions { margin-left: auto; display: flex; gap: 2px; }
  .comment-actions button {
    background: none; border: none; cursor: pointer; font-size: 11px;
    padding: 2px 6px; border-radius: 4px;
  }
  .comment-actions .edit-btn { color: #7d8590; }
  .comment-actions .edit-btn:hover { color: #c9d1d9; }
  .comment-actions .delete-btn { color: #f87171; }
  .comment-actions .delete-btn:hover { color: #ff6b6b; }
  .comment-body { font-size: 13px; color: #c9d1d9; line-height: 1.5; }

  .edit-area { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; padding: 8px; font-size: 13px; resize: vertical; min-height: 50px; outline: none; font-family: 'Plus Jakarta Sans', sans-serif; }
  .edit-actions { display: flex; gap: 6px; margin-top: 6px; justify-content: flex-end; }

  /* NAVIGATOR */
  .navigator {
    width: 320px; min-width: 320px; background: #161b22; border-left: 1px solid #21262d;
    display: flex; flex-direction: column; font-family: 'Plus Jakarta Sans', sans-serif;
    overflow: hidden; animation: fadeIn 0.2s ease;
  }
  .nav-header { padding: 12px 12px 8px; border-bottom: 1px solid #21262d; }
  .nav-title { font-weight: 700; font-size: 13px; color: #e6edf3; margin-bottom: 8px; }
  .nav-filters { display: flex; gap: 4px; flex-wrap: wrap; }
  .filter-chip {
    padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 500;
    cursor: pointer; user-select: none; transition: all 0.15s ease;
  }
  .filter-chip:hover { filter: brightness(1.2); }
  .nav-list { flex: 1; overflow-y: auto; padding: 8px; }
  .nav-item {
    padding: 8px 10px; border-radius: 6px; margin-bottom: 4px; cursor: pointer;
    transition: background 0.15s;
  }
  .nav-item:hover { background: rgba(136,198,255,0.08); }
  .nav-item-header { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
  .nav-item-cat { font-size: 12px; font-weight: 600; }
  .nav-item-ref { font-size: 11px; color: #484f58; }
  .nav-item-body { font-size: 12px; color: #8b949e; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .nav-sections { border-top: 1px solid #21262d; padding: 8px 12px; }
  .nav-sections-title { font-weight: 600; font-size: 11px; color: #7d8590; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .section-item {
    padding: 4px 8px; border-radius: 4px; font-size: 12px;
    display: flex; align-items: center; gap: 6px; margin-bottom: 2px; cursor: pointer;
    transition: background 0.15s;
  }
  .section-item:hover { background: rgba(136,198,255,0.08); }
  .section-item .sec-title { color: #c4b5fd; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .section-item .sec-count {
    font-size: 10px; background: #30363d; color: #c9d1d9;
    padding: 1px 6px; border-radius: 8px; min-width: 18px; text-align: center;
  }

  /* PROMPT MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; backdrop-filter: blur(4px);
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    width: 680px; max-height: 80vh; background: #161b22;
    border: 1px solid #30363d; border-radius: 12px;
    display: flex; flex-direction: column;
    font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden;
    box-shadow: 0 0 20px rgba(99,102,241,0.15);
    animation: fadeIn 0.2s ease;
  }
  .modal-header {
    padding: 16px 20px; border-bottom: 1px solid #21262d;
    display: flex; align-items: center;
  }
  .modal-title { font-weight: 700; font-size: 15px; color: #e6edf3; }
  .mode-toggle {
    margin-left: auto; display: flex; background: #0d1117;
    border-radius: 8px; border: 1px solid #30363d; overflow: hidden;
  }
  .mode-toggle button {
    padding: 4px 12px; font-size: 11px; border: none; cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .mode-toggle button.active { background: #1f6feb; color: #fff; }
  .mode-toggle button:not(.active) { background: transparent; color: #7d8590; }
  .modal-body { flex: 1; overflow-y: auto; padding: 20px; }
  .modal-body pre {
    font-size: 12px; color: #8b949e; line-height: 1.6;
    white-space: pre-wrap; word-break: break-word;
    font-family: 'JetBrains Mono', monospace;
  }
  .modal-footer {
    padding: 12px 20px; border-top: 1px solid #21262d;
    display: flex; align-items: center; gap: 8px;
  }
  .modal-footer .hint { font-size: 11px; color: #484f58; }
  .copied-msg { color: #34d399; font-size: 13px; font-weight: 600; }

  /* STATUS BAR */
  .statusbar {
    display: none !important;
    height: 24px; background: #1f6feb; display: flex; align-items: center;
    padding: 0 12px; font-size: 11px; color: #fff;
    font-family: 'Plus Jakarta Sans', sans-serif; flex-shrink: 0; gap: 12px;
  }
  .statusbar .sep { opacity: 0.7; }
  .statusbar .shortcuts { margin-left: auto; opacity: 0.7; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div id="app">

  <!-- TOOLBAR -->
  <div class="toolbar">
    <span class="toolbar-title">User Authentication API</span>
    <select class="version-select"><option>v1</option></select>
    <div class="toolbar-actions">
      <button class="btn" id="btnNav" onclick="toggleNav()">💬 <span id="navCount">4</span></button>
      <button class="btn" id="btnPrompt" onclick="showPromptModal()">🚀 Generate Prompt</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="plan-viewer" id="planViewer"></div>
    <div class="navigator" id="navigator" style="display:none"></div>
  </div>

  <!-- PROMPT MODAL -->
  <div class="modal-overlay hidden" id="promptModal" onclick="hidePromptModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span class="modal-title">🚀 Review Prompt</span>
        <div class="mode-toggle">
          <button id="modeSame" class="active" onclick="setPromptMode('same')">Same Session</button>
          <button id="modeFull" onclick="setPromptMode('full')">Full Context</button>
        </div>
      </div>
      <div class="modal-body"><pre id="promptContent"></pre></div>
      <div class="modal-footer">
        <span class="hint" id="promptHint">Comments only (same Copilot session)</span>
        <span style="flex:1"></span>
        <span class="copied-msg" id="copiedMsg" style="display:none">✓ Copied! Paste in Copilot Chat</span>
        <button class="btn primary" id="copyBtn" onclick="copyPrompt()" style="font-size:13px;padding:8px 20px">📋 Copy to Clipboard</button>
      </div>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div class="statusbar">
    <span>📋 Plan Reviewer</span>
    <span class="sep">|</span>
    <span id="sbComments">4 comments</span>
    <span class="sep">|</span>
    <span id="sbLines">0 lines</span>
    <span class="shortcuts">Ctrl+Shift+R: New Review · Ctrl+Shift+G: Generate Prompt</span>
  </div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────
const PLAN = `# Implementation Plan: User Authentication API

## Step 1: Database Setup
Create a PostgreSQL database with the following schema for user management.
We need tables for users, sessions, and refresh tokens.

\`\`\`sql
CREATE TABLE users (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  email VARCHAR(255) UNIQUE NOT NULL,
  password_hash VARCHAR(255) NOT NULL,
  created_at TIMESTAMP DEFAULT NOW()
);

CREATE TABLE sessions (
  id UUID PRIMARY KEY,
  user_id UUID REFERENCES users(id),
  expires_at TIMESTAMP NOT NULL
);
\`\`\`

## Step 2: API Endpoints
Implement RESTful endpoints using Express.js with TypeScript.
All endpoints should return proper HTTP status codes.

- POST /auth/register — Create new user account
- POST /auth/login — Authenticate and return JWT
- POST /auth/refresh — Refresh expired token
- DELETE /auth/logout — Invalidate session

## Step 3: JWT Token Strategy
Use RS256 algorithm with rotating key pairs.
Access tokens expire in 15 minutes, refresh tokens in 7 days.
Store refresh tokens in the database for revocation support.

## Step 4: Middleware & Guards
Create authentication middleware that validates JWT on protected routes.
Implement role-based access control (RBAC) with user roles stored in the JWT payload.

## Step 5: Rate Limiting
Apply rate limiting to auth endpoints to prevent brute force attacks.
Use a sliding window algorithm with Redis as the backing store.
Limit: 5 login attempts per minute per IP address.

## Step 6: Testing Strategy
Write integration tests for all auth flows using Jest and Supertest.
Mock the database layer for unit tests.
Include edge cases: expired tokens, invalid credentials, concurrent sessions.`;

const SUGGESTION = { label:'Suggestion', icon:'💡', color:'#60a5fa', bg:'rgba(96,165,250,0.08)', border:'#2563eb' };

let comments = [
  { id:'c1', line:4,  endLine:4,  type:'line',  category:'suggestion', body:'The database setup doesn\'t handle rollback on error. Add a transaction wrapper with try/catch and proper rollback mechanism.' },
  { id:'c2', line:25, endLine:28, type:'range', category:'suggestion', body:'Consider using CQRS pattern instead of pure REST for write operations. This would separate command and query responsibilities.' },
  { id:'c3', line:31, endLine:31, type:'line',  category:'suggestion', body:'Why RS256 instead of HS256? RS256 adds complexity with key rotation. Is this justified for the scale of this project?' },
  { id:'c4', line:1,  endLine:1,  type:'line',  category:'suggestion', body:'Good overall structure. The plan covers all the essential aspects of auth implementation.' },
];

let activeForm = null;
let selectedRange = null;
let editingId = null;
let collapsedSections = new Set();
let navOpen = false;
// category filter removed — single category mode
let status = 'in_review';
let promptMode = 'same';

// ─── PARSE ──────────────────────────────────────────────
const rawLines = PLAN.split('\n');
const lines = rawLines.map((raw, i) => {
  let html = raw
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^(#{1,6})\s(.+)/, (_,h,t) => `<span class="heading">${h} ${t}</span>`)
    .replace(/`([^`]+)`/g, '<span class="inline-code">$1</span>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong style="color:#e2e8f0">$1</strong>')
    .replace(/^- (.+)/, '<span style="color:#64748b">  •</span> $1');
  return { num: i+1, raw, html };
});

const sections = [];
lines.forEach(l => {
  const m = l.raw.match(/^(#{1,6})\s(.+)/);
  if (m) sections.push({ line: l.num, level: m[1].length, title: m[2] });
});

// code block detection
const inCodeBlock = new Set();
let insideCode = false;
lines.forEach(l => {
  if (l.raw.startsWith('```')) insideCode = !insideCode;
  else if (insideCode) inCodeBlock.add(l.num);
});

document.getElementById('sbLines').textContent = lines.length + ' lines';

// ─── RENDER ─────────────────────────────────────────────
function render() {
  renderPlan();
  renderCounts();
  renderStatusBar();
  if (navOpen) renderNavigator();
}

function renderPlan() {
  const viewer = document.getElementById('planViewer');
  let html = '';

  const commentedLines = new Set();
  comments.forEach(c => { for (let i = c.line; i <= c.endLine; i++) commentedLines.add(i); });

  for (const line of lines) {
    if (!isLineVisible(line.num)) continue;

    const isSection = !!line.raw.match(/^#{1,6}\s/);
    const secObj = sections.find(s => s.line === line.num);
    const isCollapsed = secObj && collapsedSections.has(secObj.line);
    const isCode = inCodeBlock.has(line.num);
    const isFence = line.raw.startsWith('```');
    const hasComment = commentedLines.has(line.num);
    const isInRange = selectedRange && line.num >= selectedRange.start && line.num <= selectedRange.end;

    let dotColor = '';
    if (hasComment) {
      dotColor = SUGGESTION.color;
    }

    html += `<div class="line-row${isInRange ? ' range-selected' : ''}" id="line-${line.num}" data-line="${line.num}">`;
    html += `<div class="gutter">`;
    if (dotColor) html += `<div class="gutter-dot" style="background:${dotColor}"></div>`;
    html += `<button class="add-btn" onclick="event.stopPropagation();toggleForm(${line.num})">+</button>`;
    html += `<span class="line-num">${line.num}</span>`;
    html += `</div>`;
    html += `<div class="line-divider"></div>`;
    html += `<div class="line-content">`;
    if (isSection && secObj) {
      html += `<span class="section-toggle${isCollapsed ? ' collapsed' : ''}" onclick="event.stopPropagation();toggleSection(${secObj.line})">▼</span>`;
    }
    const contentClass = isCode ? 'code-line' : isFence ? 'fence' : '';
    html += `<span class="${contentClass}">${line.html || '&nbsp;'}</span>`;
    html += `</div></div>`;

    // Comment form
    if (activeForm === line.num) {
      html += renderCommentForm(line.num);
    }

    // Comment cards for this line
    const lineComments = comments.filter(c => c.endLine === line.num);
    lineComments.forEach(c => { html += renderCommentCard(c); });
  }

  html += '<div style="height:100px"></div>';
  viewer.innerHTML = html;
}

function renderCommentForm(lineNum) {
  return `
    <div class="comment-form-inline">
      <textarea class="comment-form-inline__textarea" id="formTextarea" placeholder="Add a comment… (Ctrl+Enter to submit)" rows="1" onkeydown="handleFormKey(event)"></textarea>
      <div class="comment-form-inline__actions">
        <button class="comment-form-inline__btn comment-form-inline__btn--cancel" onclick="closeForm()">Cancel</button>
        <button class="comment-form-inline__btn comment-form-inline__btn--submit" onclick="addComment()">Send</button>
      </div>
    </div>`;
}

function renderCommentCard(c) {
  const ref = c.type === 'range' ? `Lines ${c.line}–${c.endLine}` : `Line ${c.line}`;

  if (editingId === c.id) {
    return `
      <div class="comment-card-wrap" style="border-left:2px solid ${SUGGESTION.border};border-radius:0 8px 8px 0">
        <div class="comment-card" style="background:${SUGGESTION.bg};border:1px solid ${SUGGESTION.border}22;border-left:none">
          <div class="comment-card-header">
            <span class="comment-ref">${ref}</span>
          </div>
          <textarea class="edit-area" id="editArea">${esc(c.body)}</textarea>
          <div class="edit-actions">
            <button class="btn" onclick="cancelEdit()">Cancel</button>
            <button class="btn primary" onclick="saveEdit('${c.id}')">Save</button>
          </div>
        </div>
      </div>`;
  }

  return `
    <div class="comment-card-wrap" style="border-left:2px solid ${SUGGESTION.border};border-radius:0 8px 8px 0">
      <div class="comment-card" style="background:${SUGGESTION.bg};border:1px solid ${SUGGESTION.border}22;border-left:none">
        <div class="comment-card-header">
          <span class="comment-ref">${ref}</span>
          <div class="comment-actions">
            <button class="edit-btn" onclick="startEdit('${c.id}')">Edit</button>
            <button class="delete-btn" onclick="deleteComment('${c.id}')">Delete</button>
          </div>
        </div>
        <div class="comment-body">${esc(c.body)}</div>
      </div>
    </div>`;
}

function renderCounts() {
  document.getElementById('navCount').textContent = comments.length;
}

function renderStatusBar() {
  document.getElementById('sbComments').textContent = comments.length + ' comments';
}

function renderNavigator() {
  const nav = document.getElementById('navigator');

  let html = `<div class="nav-header">`;
  html += `<div class="nav-title">Comments (${comments.length})</div>`;
  html += `</div>`;

  html += `<div class="nav-list">`;
  comments.forEach(c => {
    const ref = c.type === 'range' ? `Lines ${c.line}–${c.endLine}` : `Line ${c.line}`;
    html += `<div class="nav-item" style="border-left:2px solid ${SUGGESTION.border}" onclick="scrollToLine(${c.line})">
      <div class="nav-item-header">
        <span class="nav-item-ref">${ref}</span>
      </div>
      <div class="nav-item-body">${esc(c.body)}</div>
    </div>`;
  });
  html += `</div>`;

  nav.innerHTML = html;
}

// ─── HELPERS ────────────────────────────────────────────
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function isLineVisible(lineNum) {
  for (const sec of sections) {
    if (collapsedSections.has(sec.line)) {
      const next = sections.find(s => s.line > sec.line && s.level <= sec.level);
      const end = next ? next.line - 1 : lines.length;
      if (lineNum > sec.line && lineNum <= end) return false;
    }
  }
  return true;
}

function scrollToLine(num) {
  const el = document.getElementById('line-' + num);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.style.background = 'rgba(99,102,241,0.15)';
    setTimeout(() => { el.style.background = ''; }, 1500);
  }
}

// ─── ACTIONS ────────────────────────────────────────────
function toggleForm(lineNum) {
  if (activeForm === lineNum) { activeForm = null; selectedRange = null; }
  else { activeForm = lineNum; selectedRange = null; editingId = null; }
  render();
  if (activeForm) {
    const ta = document.getElementById('formTextarea');
    if (ta) ta.focus();
  }
}

function closeForm() {
  activeForm = null;
  selectedRange = null;
  render();
}

function handleFormKey(e) {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { addComment(); e.preventDefault(); }
  if (e.key === 'Escape') closeForm();
}

function addComment() {
  const ta = document.getElementById('formTextarea');
  if (!ta || !ta.value.trim()) return;
  const target = selectedRange || { start: activeForm, end: activeForm };
  comments.push({
    id: 'c' + Date.now(),
    line: target.start,
    endLine: target.end,
    type: target.start === target.end ? 'line' : 'range',
    category: 'suggestion',
    body: ta.value.trim(),
  });
  activeForm = null;
  selectedRange = null;
  render();
}

function deleteComment(id) {
  comments = comments.filter(c => c.id !== id);
  render();
}

function startEdit(id) {
  editingId = id;
  render();
  const ta = document.getElementById('editArea');
  if (ta) ta.focus();
}

function cancelEdit() {
  editingId = null;
  render();
}

function saveEdit(id) {
  const ta = document.getElementById('editArea');
  if (ta) {
    const c = comments.find(c => c.id === id);
    if (c) c.body = ta.value;
  }
  editingId = null;
  render();
}

function toggleSection(lineNum) {
  if (collapsedSections.has(lineNum)) collapsedSections.delete(lineNum);
  else collapsedSections.add(lineNum);
  render();
}

function toggleNav() {
  navOpen = !navOpen;
  const nav = document.getElementById('navigator');
  const btn = document.getElementById('btnNav');
  nav.style.display = navOpen ? 'flex' : 'none';
  btn.classList.toggle('active', navOpen);
  if (navOpen) renderNavigator();
}

function toggleFilter() {
  // No-op: single category mode
}

function toggleApprove() {
  status = status === 'approved' ? 'in_review' : 'approved';
  const badge = document.getElementById('statusBadge');
  const btn = document.getElementById('btnApprove');
  badge.className = 'status-badge ' + status;
  badge.textContent = status === 'approved' ? 'Approved' : 'In Review';
  btn.innerHTML = status === 'approved' ? '↩ Reopen' : '✓ Approve';
}

// ─── PROMPT MODAL ───────────────────────────────────────
function generatePrompt() {
  let p = `## Plan Review — Iteration 1\n\nThe plan has been reviewed. Apply the following feedback:\n\n`;
  if (comments.length) {
    p += `### Suggestions\n`;
    comments.forEach(c => {
      const ref = c.type === 'range' ? `Lines ${c.line}-${c.endLine}` : `Line ${c.line}`;
      p += `- **[${ref}]** ${c.body}\n`;
    });
    p += '\n';
  }
  p += `Please generate an updated plan that integrates the suggestions.`;
  if (promptMode === 'full') {
    p = `## Original Plan\n\n${PLAN}\n\n---\n\n${p}`;
  }
  return p;
}

function showPromptModal() {
  document.getElementById('promptModal').classList.remove('hidden');
  document.getElementById('promptContent').textContent = generatePrompt();
  document.getElementById('copiedMsg').style.display = 'none';
  document.getElementById('copyBtn').style.display = '';
}

function hidePromptModal() {
  document.getElementById('promptModal').classList.add('hidden');
}

function setPromptMode(mode) {
  promptMode = mode;
  document.getElementById('modeSame').classList.toggle('active', mode === 'same');
  document.getElementById('modeFull').classList.toggle('active', mode === 'full');
  document.getElementById('promptHint').textContent =
    mode === 'full' ? 'Includes full plan + comments' : 'Comments only (same Copilot session)';
  document.getElementById('promptContent').textContent = generatePrompt();
}

function copyPrompt() {
  navigator.clipboard.writeText(generatePrompt()).then(() => {
    document.getElementById('copiedMsg').style.display = '';
    document.getElementById('copyBtn').style.display = 'none';
    setTimeout(() => {
      document.getElementById('copiedMsg').style.display = 'none';
      document.getElementById('copyBtn').style.display = '';
    }, 3000);
  });
}

// ─── SHIFT-CLICK RANGE SELECTION ────────────────────────
document.addEventListener('click', function(e) {
  const row = e.target.closest('.line-row');
  if (row && e.shiftKey && activeForm) {
    const lineNum = parseInt(row.dataset.line);
    selectedRange = {
      start: Math.min(activeForm, lineNum),
      end: Math.max(activeForm, lineNum)
    };
    render();
    const ta = document.getElementById('formTextarea');
    if (ta) ta.focus();
  }
});

// ─── TEXT SELECTION & FLOATING BUTTON ────────────────────
let selectionBtn = null;

document.getElementById('planViewer').addEventListener('mouseup', function(e) {
  if (selectionBtn) { selectionBtn.remove(); selectionBtn = null; }
  document.querySelectorAll('.line-row--selecting').forEach(el => el.classList.remove('line-row--selecting'));

  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) return;

  const range = sel.getRangeAt(0);
  const startEl = range.startContainer.nodeType === Node.TEXT_NODE ? range.startContainer.parentElement : range.startContainer;
  const endEl = range.endContainer.nodeType === Node.TEXT_NODE ? range.endContainer.parentElement : range.endContainer;
  const startRow = startEl?.closest('.line-row');
  const endRow = endEl?.closest('.line-row');
  if (!startRow || !endRow) return;

  const startLine = parseInt(startRow.dataset.line);
  const endLine = parseInt(endRow.dataset.line);
  if (isNaN(startLine) || isNaN(endLine)) return;

  const minLine = Math.min(startLine, endLine);
  const maxLine = Math.max(startLine, endLine);

  for (let i = minLine; i <= maxLine; i++) {
    const row = document.getElementById('line-' + i);
    if (row) row.classList.add('line-row--selecting');
  }

  selectionBtn = document.createElement('button');
  selectionBtn.className = 'selection-comment-btn';
  selectionBtn.setAttribute('aria-label', 'Add comment on selection');
  selectionBtn.innerHTML = '+';
  selectionBtn.style.left = e.clientX + 'px';
  selectionBtn.style.top = (e.clientY - 36) + 'px';
  selectionBtn.onclick = function() {
    activeForm = minLine;
    selectedRange = { start: minLine, end: maxLine };
    sel.removeAllRanges();
    selectionBtn.remove();
    selectionBtn = null;
    render();
    const ta = document.getElementById('formTextarea');
    if (ta) ta.focus();
  };
  document.body.appendChild(selectionBtn);
});

// ─── SEARCH (CTRL+F) ────────────────────────────────────
let searchOpen = false;
let searchQuery = '';
let searchMatchLines = [];
let searchIdx = 0;

document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
    e.preventDefault();
    if (!searchOpen) {
      searchOpen = true;
      renderSearchBar();
    } else {
      const input = document.querySelector('.search-bar__input');
      if (input) input.focus();
    }
  }
});

function renderSearchBar() {
  let bar = document.querySelector('.search-bar');
  if (bar) bar.remove();
  if (!searchOpen) return;

  bar = document.createElement('div');
  bar.className = 'search-bar';
  bar.innerHTML = `
    <input class="search-bar__input" type="text" placeholder="Search..." value="${esc(searchQuery)}">
    <span class="search-bar__count">${searchMatchLines.length > 0 ? searchIdx + ' / ' + searchMatchLines.length : '0 / 0'}</span>
    <button class="search-bar__btn" aria-label="Previous match" title="Previous match" onclick="searchPrev()">&#x25B2;</button>
    <button class="search-bar__btn" aria-label="Next match" title="Next match" onclick="searchNext()">&#x25BC;</button>
    <button class="search-bar__btn" aria-label="Close search" title="Close search" onclick="closeSearch()">&#x2715;</button>
  `;

  const main = document.querySelector('.main');
  main.parentNode.insertBefore(bar, main);

  const input = bar.querySelector('.search-bar__input');
  input.focus();
  input.addEventListener('input', function() {
    searchQuery = this.value;
    updateSearchMatches();
    updateSearchBarCount();
    applySearchHighlights();
  });
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { e.preventDefault(); closeSearch(); }
    else if (e.key === 'Enter') { e.preventDefault(); if (e.shiftKey) searchPrev(); else searchNext(); }
  });
}

function updateSearchBarCount() {
  const countEl = document.querySelector('.search-bar__count');
  if (countEl) {
    countEl.textContent = searchMatchLines.length > 0 ? searchIdx + ' / ' + searchMatchLines.length : '0 / 0';
  }
}

function updateSearchMatches() {
  searchMatchLines = [];
  if (!searchQuery) { searchIdx = 0; return; }
  const q = searchQuery.toLowerCase();
  lines.forEach(l => { if (l.raw.toLowerCase().includes(q)) searchMatchLines.push(l.num); });
  searchIdx = searchMatchLines.length > 0 ? 1 : 0;
}

function applySearchHighlights() {
  document.querySelectorAll('.line-row--search-match, .line-row--search-current').forEach(el => {
    el.classList.remove('line-row--search-match', 'line-row--search-current');
  });
  searchMatchLines.forEach(num => {
    const row = document.getElementById('line-' + num);
    if (row) row.classList.add('line-row--search-match');
  });
  if (searchIdx > 0 && searchMatchLines.length > 0) {
    const currentLine = searchMatchLines[searchIdx - 1];
    const row = document.getElementById('line-' + currentLine);
    if (row) {
      row.classList.add('line-row--search-current');
      row.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
  }
}

function searchNext() {
  if (searchMatchLines.length === 0) return;
  searchIdx = searchIdx >= searchMatchLines.length ? 1 : searchIdx + 1;
  updateSearchBarCount();
  applySearchHighlights();
}

function searchPrev() {
  if (searchMatchLines.length === 0) return;
  searchIdx = searchIdx <= 1 ? searchMatchLines.length : searchIdx - 1;
  updateSearchBarCount();
  applySearchHighlights();
}

function closeSearch() {
  searchOpen = false;
  searchQuery = '';
  searchMatchLines = [];
  searchIdx = 0;
  const bar = document.querySelector('.search-bar');
  if (bar) bar.remove();
  document.querySelectorAll('.line-row--search-match, .line-row--search-current').forEach(el => {
    el.classList.remove('line-row--search-match', 'line-row--search-current');
  });
}

// ─── INIT ───────────────────────────────────────────────
render();
</script>
</body>
</html>
