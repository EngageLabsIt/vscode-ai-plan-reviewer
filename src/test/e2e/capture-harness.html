<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280, initial-scale=1.0" />
  <title>Plan Reviewer — Capture Harness</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="../../../dist/webview.css" />
  <style>
    body { margin: 0; height: 100vh; overflow: hidden; }
  </style>
  <script>
    // ── Mock VS Code API ───────────────────────────────────────────────
    // Must be defined before the bundle loads (useVsCodeApi calls acquireVsCodeApi on import)

    const PLAN_ID = '00000000-0000-7000-8000-000000000001';
    const VERSION_ID = '00000000-0000-7000-8000-000000000002';
    const NOW = new Date().toISOString();

    const PLAN_CONTENT = [
      '# User Authentication API',                          // 1
      '',                                                    // 2
      'Design for a secure user authentication system.',     // 3
      '',                                                    // 4
      '## Step 1: Database Schema',                          // 5
      '',                                                    // 6
      '```sql',                                              // 7
      'CREATE TABLE users (',                                // 8
      '  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),',    // 9
      '  email VARCHAR(255) UNIQUE NOT NULL,',               // 10
      '  password_hash VARCHAR(255) NOT NULL,',              // 11
      '  created_at TIMESTAMP DEFAULT NOW(),',               // 12
      '  updated_at TIMESTAMP DEFAULT NOW()',                // 13
      ');',                                                  // 14
      '',                                                    // 15
      'CREATE TABLE sessions (',                             // 16
      '  id UUID PRIMARY KEY,',                              // 17
      '  user_id UUID REFERENCES users(id),',               // 18
      '  token VARCHAR(512) NOT NULL,',                      // 19
      '  expires_at TIMESTAMP NOT NULL',                     // 20
      ');',                                                  // 21
      '```',                                                 // 22
      '',                                                    // 23
      '## Step 2: API Endpoints',                            // 24
      '',                                                    // 25
      '- POST /api/auth/register — Create a new user',      // 26
      '- POST /api/auth/login — Authenticate and get token', // 27
      '- POST /api/auth/logout — Invalidate session',       // 28
      '- GET /api/auth/me — Get current user profile',      // 29
      '',                                                    // 30
      '## Step 3: JWT Strategy',                             // 31
      '',                                                    // 32
      'Use RS256 with rotating key pairs. Access tokens expire in 15 minutes,', // 33
      'refresh tokens expire in 7 days. Store refresh tokens in HttpOnly cookies.', // 34
      '',                                                    // 35
      '## Step 4: Rate Limiting',                            // 36
      '',                                                    // 37
      'Apply rate limiting per IP and per user:',            // 38
      '',                                                    // 39
      '- Login: 5 attempts per minute',                      // 40
      '- Register: 3 attempts per minute',                   // 41
      '- API calls: 100 requests per minute per user',       // 42
      '- Use a sliding window counter algorithm',            // 43
      '',                                                    // 44
      '## Step 5: Password Policy',                          // 45
      '',                                                    // 46
      'Minimum 12 characters, require uppercase, lowercase, digit, and special character.', // 47
      'Use bcrypt with cost factor 12 for hashing.',         // 48
      '',                                                    // 49
      '## Step 6: Audit Logging',                            // 50
      '',                                                    // 51
      'Log all authentication events:',                      // 52
      '',                                                    // 53
      '- Successful login',                                  // 54
      '- Failed login attempt',                              // 55
      '- Password change',                                   // 56
      '- Account lockout',                                   // 57
    ].join('\n');

    const SECTIONS = [
      { id: 'sec-0', versionId: VERSION_ID, heading: 'User Authentication API', startLine: 1, endLine: 4,  level: 1, orderIndex: 0 },
      { id: 'sec-1', versionId: VERSION_ID, heading: 'Step 1: Database Schema',  startLine: 5, endLine: 23, level: 2, orderIndex: 1 },
      { id: 'sec-2', versionId: VERSION_ID, heading: 'Step 2: API Endpoints',    startLine: 24, endLine: 30, level: 2, orderIndex: 2 },
      { id: 'sec-3', versionId: VERSION_ID, heading: 'Step 3: JWT Strategy',     startLine: 31, endLine: 35, level: 2, orderIndex: 3 },
      { id: 'sec-4', versionId: VERSION_ID, heading: 'Step 4: Rate Limiting',    startLine: 36, endLine: 44, level: 2, orderIndex: 4 },
      { id: 'sec-5', versionId: VERSION_ID, heading: 'Step 5: Password Policy',  startLine: 45, endLine: 49, level: 2, orderIndex: 5 },
      { id: 'sec-6', versionId: VERSION_ID, heading: 'Step 6: Audit Logging',    startLine: 50, endLine: 57, level: 2, orderIndex: 6 },
    ];

    const COMMENTS = [
      {
        id: 'cmt-1', versionId: VERSION_ID, type: 'line', targetStart: 8, targetEnd: 8,
        sectionId: null, body: 'Consider adding a rollback migration for this table in case the deploy fails.',
        category: 'suggestion', createdAt: NOW, carriedFromId: null,
        targetStartChar: null, targetEndChar: null, selectedText: null,
      },
      {
        id: 'cmt-2', versionId: VERSION_ID, type: 'range', targetStart: 26, targetEnd: 29,
        sectionId: null, body: 'These endpoints could benefit from a CQRS pattern to separate read and write operations.',
        category: 'suggestion', createdAt: NOW, carriedFromId: null,
        targetStartChar: null, targetEndChar: null, selectedText: null,
      },
      {
        id: 'cmt-3', versionId: VERSION_ID, type: 'line', targetStart: 33, targetEnd: 33,
        sectionId: null, body: 'Token rotation should include a grace period to avoid invalidating in-flight requests.',
        category: 'suggestion', createdAt: NOW, carriedFromId: null,
        targetStartChar: null, targetEndChar: null, selectedText: null,
      },
      {
        id: 'cmt-4', versionId: VERSION_ID, type: 'line', targetStart: 43, targetEnd: 43,
        sectionId: null, body: 'A sliding window approach is good. Consider using Redis sorted sets for distributed rate limiting.',
        category: 'suggestion', createdAt: NOW, carriedFromId: null,
        targetStartChar: null, targetEndChar: null, selectedText: null,
      },
    ];

    let commentCounter = 10;

    // Build HTML from PLAN_CONTENT, producing proper annotatable-block elements
    // with data-line attributes — mirrors what PlanMarkdownEngine (markdown-it) produces.
    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function buildHtml(content) {
      const lines = content.split('\n');
      let i = 0;
      let html = '';
      let inList = false;

      function closeList() {
        if (inList) { html += '</ul>\n'; inList = false; }
      }

      while (i < lines.length) {
        const line = lines[i];
        const lineNum = i + 1;

        // Code fence
        const fenceMatch = line.match(/^(`{3,}|~{3,})\s*(\w*)/);
        if (fenceMatch) {
          closeList();
          const fence = fenceMatch[1];
          const lang = fenceMatch[2];
          const codeLines = [];
          const startLine = lineNum;
          i++;
          while (i < lines.length) {
            if (lines[i].match(new RegExp('^' + fence[0] + '{' + fence.length + ',}\\s*$'))) { i++; break; }
            codeLines.push(escapeHtml(lines[i]));
            i++;
          }
          html += '<pre class="annotatable-block" data-line="' + startLine + '" data-line-end="' + i + '"><code' + (lang ? ' class="language-' + lang + '"' : '') + '>' + codeLines.join('\n') + '</code></pre>\n';
          continue;
        }

        // Heading
        const headingMatch = line.match(/^(#{1,6})\s+(.*)/);
        if (headingMatch) {
          closeList();
          const level = headingMatch[1].length;
          const text = escapeHtml(headingMatch[2]);
          html += '<h' + level + ' class="annotatable-block" data-line="' + lineNum + '" data-line-end="' + lineNum + '">' + text + '</h' + level + '>\n';
          i++;
          continue;
        }

        // List item (unordered)
        const listMatch = line.match(/^[-*+]\s+(.*)/);
        if (listMatch) {
          if (!inList) { html += '<ul>\n'; inList = true; }
          const text = escapeHtml(listMatch[1]);
          html += '<li class="annotatable-block" data-line="' + lineNum + '" data-line-end="' + lineNum + '">' + text + '</li>\n';
          i++;
          continue;
        }

        // Empty line
        if (!line.trim()) {
          closeList();
          i++;
          continue;
        }

        // Paragraph
        closeList();
        html += '<p class="annotatable-block" data-line="' + lineNum + '" data-line-end="' + lineNum + '">' + escapeHtml(line) + '</p>\n';
        i++;
      }

      closeList();
      return html;
    }

    function acquireVsCodeApi() {
      return {
        postMessage(msg) {
          if (msg.type === 'ready') {
            setTimeout(() => {
              window.postMessage({
                type: 'planLoaded',
                payload: {
                  plan: { id: PLAN_ID, title: 'User Authentication API', source: 'manual', status: 'in_review', tags: [], createdAt: NOW, updatedAt: NOW },
                  version: { id: VERSION_ID, planId: PLAN_ID, versionNumber: 1, content: PLAN_CONTENT, reviewPrompt: null, createdAt: NOW },
                  versions: [{ id: VERSION_ID, planId: PLAN_ID, versionNumber: 1, content: PLAN_CONTENT, reviewPrompt: null, createdAt: NOW }],
                  sections: SECTIONS,
                  comments: COMMENTS,
                  html: buildHtml(PLAN_CONTENT),
                },
              }, '*');
            }, 50);
          }

          if (msg.type === 'addComment') {
            commentCounter++;
            const newComment = {
              ...msg.payload,
              id: 'cmt-new-' + commentCounter,
              createdAt: new Date().toISOString(),
            };
            setTimeout(() => {
              window.postMessage({ type: 'commentAdded', payload: newComment }, '*');
            }, 30);
          }

          if (msg.type === 'deleteComment') {
            setTimeout(() => {
              window.postMessage({ type: 'commentDeleted', payload: { commentId: msg.payload.id } }, '*');
            }, 30);
          }

          if (msg.type === 'updateComment') {
            const existing = COMMENTS.find(c => c.id === msg.payload.id);
            if (existing) {
              const updated = { ...existing, ...msg.payload };
              setTimeout(() => {
                window.postMessage({ type: 'commentUpdated', payload: updated }, '*');
              }, 30);
            }
          }

        },
        getState() { return undefined; },
        setState(s) { return s; },
      };
    }
  </script>
</head>
<body>
  <div id="root"></div>
  <script src="../../../dist/webview.js"></script>
</body>
</html>
